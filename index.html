<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grade 2 Learning Passport — SHAP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --paper: #F7F6F3;
    --paper-dark: #EDEBE3;
    --card: #FFFDF9;
    --ink: #2E2D52;
    --ink-soft: #777698;
    --line: #E6E2D9;
    --q1: #ED9C2E;
    --q1-soft: #FBE9D0;
    --q2: #22B588;
    --q2-soft: #DAF4EA;
    --q3: #6886F2;
    --q3-soft: #E7EBFD;
    --q4: #F37BAA;
    --q4-soft: #FDE3EE;
    --night: #2B55D4;
    --night-deep: #19348E;
    --gold: #EFC24C;
    --good: #22B588;
    --bad: #F26976;
    --radius-lg: 26px;
    --radius-md: 18px;
    --radius-sm: 12px;
    --shadow: 0 5px 0 rgba(43,42,85,0.14);
    --shadow-lg: 0 10px 24px rgba(27,77,228,0.18);
    /* ---- reward / achievement accent (used only for badges, progress hero,
       level-up celebrations & results rewards — never on lesson/quiz pages) ---- */
    --aw-bg1: #171233;
    --aw-bg2: #0A0A1C;
    --aw-cyan: #35F2E0;
    --aw-magenta: #FF3CAC;
    --aw-purple: #7B2FF7;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 12% 8%, rgba(239,194,76,0.14), transparent 40%),
      radial-gradient(circle at 88% 4%, rgba(104,134,242,0.12), transparent 38%),
      radial-gradient(circle at 6px 6px, rgba(43,85,212,0.06) 2px, transparent 0) 0 0/28px 28px,
      var(--paper);
    color:var(--ink);
    font-family:'Nunito', sans-serif;
    font-size:16px;
    min-height:100vh;
  }
  #root{max-width:960px;margin:0 auto;padding:20px 16px 60px;}
  @media(min-width:1100px){ #root{max-width:1080px;padding:28px 24px 70px;} }
  @media(min-width:1440px){ #root{max-width:1180px;} }
  h1,h2,h3,.display{font-family:'Fredoka', sans-serif;}
  .mono{font-family:'Space Mono', monospace;}
  button{font-family:'Nunito', sans-serif;cursor:pointer;}
  a{color:inherit;}
  :focus-visible{outline:3px solid var(--night);outline-offset:2px;border-radius:8px;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important;animation-iteration-count:1 !important;transition-duration:0.001ms !important;}
  }

  .btn{
    border:none;border-radius:var(--radius-sm);padding:13px 22px;font-weight:800;font-size:15.5px;
    box-shadow: var(--shadow);
    transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
    font-family:'Fredoka', sans-serif;
  }
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(43,42,85,0.14);}
  @media (hover:hover){ .btn:hover{filter:brightness(1.06);} }
  .btn-primary{background:var(--night);color:#fff;}
  .btn-ghost{background:var(--card);color:var(--ink-soft);box-shadow:none;border:2.5px solid var(--line);}
  .btn-ghost:active{transform:none;}

  /* ---------- HEADER ---------- */
  .app-header{
    display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;row-gap:10px;column-gap:10px;
    margin-bottom:22px;
  }
  .brand{display:flex;align-items:center;gap:12px;border-radius:18px;padding:4px;transition:transform .15s ease;
    min-width:0;flex:1 1 auto;}
  @media (hover:hover){ .brand:hover{transform:translateY(-2px);} }
  .brand-badge{
    width:50px;height:50px;border-radius:16px;flex:0 0 auto;
    background:linear-gradient(150deg, var(--night), var(--night-deep));
    color:var(--gold);
    display:flex;align-items:center;justify-content:center;font-size:24px;
    box-shadow: var(--shadow);
  }
  .brand-text{min-width:0;}
  .brand-text .eyebrow{
    font-family:'Fredoka', sans-serif;font-size:11px;letter-spacing:.06em;font-weight:600;
    text-transform:uppercase;color:var(--ink-soft);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .brand-text h1{font-size:22px;margin:0;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .header-actions{display:flex;align-items:center;gap:8px;flex:0 0 auto;flex-wrap:wrap;justify-content:flex-end;}
  @media(max-width:420px){
    .brand-badge{width:42px;height:42px;font-size:20px;border-radius:14px;}
    .brand-text h1{font-size:18px;}
    .brand-text .eyebrow{font-size:9.5px;}
    .header-actions{gap:6px;}
    .settings-btn{width:38px;height:38px;font-size:15px;}
  }
  .app-header-footer{
    margin-bottom:0;margin-top:26px;padding-top:18px;
    border-top:2px solid var(--line);
  }

  /* ---------- PASSPORT / DASHBOARD HERO ---------- */
  .passport{
    background:
      radial-gradient(circle at 92% -8%, rgba(53,242,224,0.20), transparent 42%),
      radial-gradient(circle at -6% 110%, rgba(255,60,172,0.16), transparent 45%),
      linear-gradient(135deg, #1B1650 0%, #171233 55%, #0A0A1C 100%);
    border-radius:var(--radius-lg);padding:26px 22px 22px;
    color:#EAF1FF;
    margin-bottom:26px;
    position:relative;
    overflow:hidden;
    box-shadow: 0 0 0 1.5px rgba(53,242,224,0.4), 0 12px 28px rgba(123,47,247,0.25), var(--shadow-lg);
  }
  .passport::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(53,242,224,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(53,242,224,0.06) 1px, transparent 1px);
    background-size:26px 26px;
    mask-image: radial-gradient(circle at 85% 0%, black, transparent 70%);
  }
  .passport::after{
    content:"⭐";position:absolute;right:18px;top:14px;font-size:26px;
    opacity:.7;transform:rotate(12deg);
    filter:drop-shadow(0 0 8px var(--aw-cyan));
  }
  .passport-title{
    font-family:'Fredoka', sans-serif;font-size:12.5px;letter-spacing:.1em;font-weight:600;
    text-transform:uppercase;color:#BFD4FF;margin-bottom:4px;position:relative;
  }
  .passport-name{font-family:'Fredoka';font-weight:600;font-size:22px;margin-bottom:16px;color:#fff;position:relative;}
  .stamp-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;position:relative;}
  @media(min-width:560px){.stamp-row{grid-template-columns:repeat(4,1fr);}}
  @media(min-width:860px){.stamp-row{grid-template-columns:repeat(6,1fr);}}
  .stamp{
    border-radius:20px;padding:20px 8px 16px;text-align:center;
    background:rgba(255,255,255,0.10);
    border:1.5px solid rgba(255,255,255,0.16);
    position:relative;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
    min-height:108px;
    transition:transform .15s cubic-bezier(.34,1.56,.64,1), background .15s ease, box-shadow .15s ease;
    cursor:pointer;font-family:inherit;color:inherit;
  }
  .stamp:active{transform:translateY(2px) scale(0.96);}
  @media (hover:hover){ .stamp:hover{transform:translateY(-3px) scale(1.03);background:rgba(255,255,255,0.18);box-shadow:0 6px 14px rgba(0,0,0,0.18);} }
  .stamp .icon{font-size:30px;line-height:1;margin-bottom:0;filter:drop-shadow(0 2px 0 rgba(0,0,0,0.12));}
  .stamp .label{font-size:11px;font-family:'Fredoka';font-weight:700;letter-spacing:.04em;color:#C7D6F5;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
  .stamp .frac{font-family:'Fredoka';font-weight:700;font-size:17px;color:#fff;margin-top:0;}
  .stamp.complete{
    border-color: var(--aw-cyan);
    background: linear-gradient(160deg, rgba(53,242,224,0.20), rgba(255,60,172,0.14));
    box-shadow: 0 0 0 1px rgba(53,242,224,0.55), 0 0 16px rgba(53,242,224,0.4);
  }
  .stamp.complete::after{
    content:"✓";
    position:absolute;top:-6px;right:-6px;
    background:linear-gradient(135deg, var(--aw-cyan), var(--aw-magenta));color:#0A0A1C;
    font-weight:800;font-size:12px;
    width:20px;height:20px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 8px rgba(53,242,224,0.8), 0 2px 0 rgba(0,0,0,0.15);
  }

  /* ---------- ICON BADGES (used on subject/quarter cards) ---------- */
  .icon-badge{
    width:56px;height:56px;border-radius:18px;
    display:flex;align-items:center;justify-content:center;
    font-size:28px;margin-bottom:10px;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.06);
  }
  .icon-badge-sm{
    width:44px;height:44px;border-radius:14px;font-size:22px;margin-bottom:0;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.06);
  }

  /* ---------- SUBJECT CARDS ---------- */
  .subject-grid{display:grid;grid-template-columns:1fr;gap:14px;}
  @media(min-width:640px){.subject-grid{grid-template-columns:1fr 1fr 1fr;}}
  @media(min-width:1100px){.subject-grid{grid-template-columns:1fr 1fr 1fr 1fr;}}
  .subject-card{
    background:var(--card);border-radius:var(--radius-lg);padding:20px 18px;
    border:2.5px solid var(--line);box-shadow:var(--shadow);
    text-align:left;position:relative;overflow:hidden;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  @media (hover:hover){
    .subject-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--night);}
  }
  .subject-card:active{transform:translateY(2px);}
  .subject-card .sicon{font-size:32px;margin-bottom:8px;}
  .subject-card h2{font-size:18px;margin:0 0 3px;}
  .subject-card .stag{font-size:12.5px;color:var(--ink-soft);margin-bottom:12px;font-weight:600;}
  .subject-card .smeta{font-size:12px;color:var(--ink-soft);font-family:'Space Mono';font-weight:700;}

  /* ---------- SUBJECT SQUARES (icon + fraction) ---------- */
  .subject-square-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  @media(min-width:560px){.subject-square-grid{grid-template-columns:repeat(4,1fr);}}
  @media(min-width:1100px){.subject-square-grid{grid-template-columns:repeat(6,1fr);}}
  .subject-square{
    background:var(--card);border:2.5px solid var(--line);border-radius:var(--radius-md);
    padding:18px 8px 14px;display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;
    box-shadow:var(--shadow);transition:transform .12s ease, box-shadow .12s ease;
  }
  .subject-square:active{transform:translateY(2px);box-shadow:none;}
  @media (hover:hover){
    .subject-square:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--night);}
  }
  .subject-square .sq-icon{font-size:28px;line-height:1;margin-bottom:2px;}
  .subject-square .sq-label{font-family:'Fredoka';font-weight:700;font-size:11px;letter-spacing:.04em;
    text-transform:uppercase;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap;max-width:100%;}
  .subject-square .sq-frac{font-family:'Fredoka';font-weight:800;font-size:17px;margin-top:2px;}
  .subject-square.complete{
    box-shadow:0 0 0 2px var(--aw-cyan), 0 0 14px rgba(53,242,224,0.4), var(--shadow);
    background:linear-gradient(165deg, #fff 55%, rgba(53,242,224,0.08));
  }

  .subject-switch{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding-bottom:2px;}
  .subject-chip{
    flex:0 0 auto;padding:9px 16px;border-radius:20px;font-weight:800;font-size:13px;
    border:2.5px solid var(--line);background:var(--card);color:var(--ink-soft);white-space:nowrap;
    font-family:'Fredoka';
  }
  .subject-chip.active{background:var(--night);color:#fff;border-color:var(--night);}

  /* ---------- QUARTER CARDS ---------- */
  .quarter-grid{display:grid;grid-template-columns:1fr;gap:14px;}
  @media(min-width:640px){.quarter-grid{grid-template-columns:1fr 1fr;}}
  @media(min-width:1100px){.quarter-grid{grid-template-columns:1fr 1fr 1fr;}}
  .qcard{
    background:var(--card);border-radius:var(--radius-lg);padding:20px;
    border:2.5px solid var(--line);box-shadow: var(--shadow);
    text-align:left;position:relative;overflow:hidden;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  @media (hover:hover){
    .qcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);}
  }
  .qcard:active{transform:translateY(2px);}
  .qcard .qnum{
    font-family:'Fredoka';font-weight:600;font-size:11.5px;letter-spacing:.06em;color:var(--ink-soft);
    text-transform:uppercase;
  }
  .qcard h2{font-size:19px;margin:2px 0 2px;}
  .qcard .theme{font-size:13px;color:var(--ink-soft);margin-bottom:12px;font-weight:600;}
  .qcard .qicon{
    position:absolute;right:16px;top:16px;font-size:36px;opacity:.95;
    filter:drop-shadow(0 3px 0 rgba(0,0,0,0.06));
  }
  .progress-track{
    height:12px;border-radius:20px;background:var(--paper-dark);overflow:hidden;margin-bottom:8px;
    box-shadow:inset 0 1px 3px rgba(43,42,85,0.1);
  }
  .progress-fill{height:100%;border-radius:20px;transition:width .4s ease;}
  .qcard .meta{font-size:12px;color:var(--ink-soft);font-family:'Space Mono';font-weight:700;}

  /* ---------- BACK BAR / SECTION TITLES ---------- */
  .backbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .backbtn{
    background:var(--card);border:2.5px solid var(--line);border-radius:14px;
    width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:17px;
    font-weight:800;transition:transform .12s ease;
  }
  .backbtn:active{transform:translateY(2px) scale(0.96);}
  .section-title{
    font-family:'Fredoka';font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink-soft);margin:24px 0 10px;padding-left:2px;
  }
  .chapter-title{font-size:18px;margin:0 0 10px;}

  /* ---------- LESSON CARDS ---------- */
  .lesson-card{
    background:var(--card);border-radius:var(--radius-md);border:2.5px solid var(--line);
    padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:10px;
    box-shadow:var(--shadow);transition:transform .12s ease, box-shadow .12s ease;
  }
  @media (hover:hover){ .lesson-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);} }
  .lesson-num{
    width:38px;height:38px;border-radius:12px;flex:0 0 38px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Fredoka';font-weight:700;font-size:15px;color:#fff;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.1);
  }
  .lesson-body{flex:1;min-width:0;}
  .lesson-body h3{margin:0 0 2px;font-size:15.5px;}
  .lesson-body .sub{font-size:12.5px;color:var(--ink-soft);font-weight:600;}
  .lesson-status{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .pill{
    font-family:'Fredoka';font-weight:700;font-size:11px;padding:4px 10px;border-radius:20px;
    display:inline-flex;align-items:center;gap:4px;
  }
  .pill.done{background:var(--q2-soft);color:#0A8F68;}
  .pill.todo{background:var(--paper-dark);color:var(--ink-soft);}
  .pill.score-good{background:var(--q2-soft);color:#0A8F68;}
  .pill.score-bad{background:#FDE3E6;color:#C43D4B;}
  .chev{font-size:20px;color:var(--ink-soft);flex:0 0 auto;}

  .longquiz-card{
    margin-top:24px;border-radius:var(--radius-lg);padding:22px;
    background:linear-gradient(135deg, var(--night), var(--night-deep));color:#fff;
    display:flex;align-items:center;gap:16px;
    box-shadow: 0 0 0 1.5px rgba(53,242,224,0.3), var(--shadow-lg);position:relative;overflow:hidden;
  }
  .longquiz-card::after{content:"🏆";position:absolute;right:-6px;bottom:-10px;font-size:64px;opacity:.16;filter:drop-shadow(0 0 10px rgba(255,201,60,0.5));}
  .longquiz-card .lqicon{font-size:34px;}
  .longquiz-card h3{margin:0 0 4px;font-size:18px;}
  .longquiz-card p{margin:0;font-size:12.5px;color:#C9C2FF;}
  .longquiz-card .btn{margin-left:auto;flex:0 0 auto;position:relative;}

  /* ---------- LESSON VIEW / TABS ---------- */
  .tabbar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .tab{
    padding:11px 18px;border-radius:14px;font-weight:800;font-size:14px;
    border:2.5px solid var(--line);background:var(--card);color:var(--ink-soft);
    font-family:'Fredoka';transition:transform .12s ease;
  }
  .tab:active{transform:translateY(2px);}
  .tab.active{background:var(--night);color:#fff;border-color:var(--night);}

  .journal-page{
    background:var(--card);border-radius:var(--radius-md);
    border:2.5px solid var(--line);
    padding:24px 22px;position:relative;
    box-shadow:var(--shadow);
  }
  .journal-page h3{margin-top:0;font-size:20px;}
  .journal-page ul{padding-left:22px;margin:0;}
  .journal-page li{margin-bottom:13px;line-height:1.6;font-size:15px;}
  .journal-page li::marker{color:var(--night);font-weight:800;}
  .learn-footer{display:flex;justify-content:flex-end;margin-top:18px;}

  /* ---------- YOUTUBE VIDEO EMBED ---------- */
  .video-embed{
    position:relative; width:100%; padding-top:56.25%; /* 16:9 */
    border-radius:var(--radius-md); overflow:hidden;
    background:#000; box-shadow:var(--shadow); margin-bottom:18px;
    border:2.5px solid var(--line);
  }
  .video-embed iframe{
    position:absolute; top:0; left:0; width:100%; height:100%; border:none;
  }

  /* ---------- QUIZ ---------- */
  .quiz-progress{
    display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;
    font-family:'Fredoka';font-weight:700;font-size:13px;color:var(--ink-soft);
  }
  .quiz-dots{display:flex;gap:6px;}
  .quiz-dot{width:9px;height:9px;border-radius:50%;background:var(--line);transition:background .2s ease;}
  .quiz-dot.filled{background:var(--night);animation:dotPop .3s cubic-bezier(.34,1.56,.64,1) both;}
  @keyframes dotPop{0%{transform:scale(0.4);}60%{transform:scale(1.35);}100%{transform:scale(1);}}
  .quiz-card{
    background:var(--card);border:2.5px solid var(--line);border-radius:var(--radius-lg);padding:24px;
    box-shadow:var(--shadow-lg);
  }
  .quiz-tag{font-family:'Fredoka';font-weight:700;font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
  .quiz-q{font-size:18px;font-weight:800;margin-bottom:18px;line-height:1.4;}
  .quiz-opt{
    display:block;width:100%;text-align:left;background:var(--paper);
    border:2.5px solid var(--line);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px;
    font-size:15px;font-weight:700;color:var(--ink);transition:transform .1s ease, border-color .12s ease;
  }
  @media (hover:hover){ .quiz-opt:hover:not(:disabled){border-color:var(--night);transform:translateY(-2px);} }
  .quiz-opt.correct{background:var(--q2-soft);border-color:var(--good);color:#0A8F68;}
  .quiz-opt.incorrect{background:#FDE3E6;border-color:var(--bad);color:#C43D4B;}
  .quiz-opt.dimmed{opacity:.5;}
  .quiz-opt:disabled{cursor:default;}
  .feedback-box{
    margin-top:8px;padding:14px 16px;border-radius:var(--radius-sm);font-size:14px;line-height:1.55;font-weight:600;
  }
  .feedback-box.good{background:var(--q2-soft);color:#0A6B4E;}
  .feedback-box.bad{background:#FDE3E6;color:#9A2C36;}
  .quiz-footer{display:flex;justify-content:flex-end;margin-top:16px;}

  /* ---------- RESULTS ---------- */
  .results-card{
    background:var(--card);border:2.5px solid var(--line);border-radius:var(--radius-lg);padding:32px 22px;text-align:center;
    box-shadow:var(--shadow-lg);
  }
  .results-emoji{font-size:56px;}
  .results-score{font-family:'Fredoka';font-weight:700;font-size:40px;margin:6px 0 2px;color:var(--night);}
  .results-sub{color:var(--ink-soft);font-size:14.5px;margin-bottom:18px;font-weight:600;}
  .review-list{text-align:left;margin-top:18px;}
  .review-item{
    border:2.5px solid var(--line);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:10px;
  }
  .review-item .rq{font-weight:800;font-size:14px;margin-bottom:6px;}
  .review-item .ra{font-size:13px;margin-bottom:2px;font-weight:600;}
  .review-item .ra.wrong{color:var(--bad);}

<script type="text/babel" data-presets="env,react">
const {useState, useEffect, useMemo} = React;

/* =========================================================
   FIREBASE — cloud sync (no login/auth; open read/write via REST)
   Same Firebase project as the daily-ledger app, but its own
   database path ("grade2_passport") so this app's data never collides with the Grade 4 app's.
   ========================================================= */
const FIREBASE_DB_URL = "https://grade2-c6f51-default-rtdb.firebaseio.com/";
const CLOUD_URL = FIREBASE_DB_URL + "grade2_passport.json";
const LS_PREFIX = "gs2_"; // every localStorage key this app uses starts with this

// Bundles every gs2_ localStorage key into one JSON blob for Firebase.
function buildLocalSnapshot(){
  const out = {};
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k && k.indexOf(LS_PREFIX)===0){
      try{ out[k] = JSON.parse(localStorage.getItem(k)); }catch(e){}
    }
  }
  return out;
}

let cloudSyncTimer = null;
function queueCloudSync(){
  // Debounce so rapid edits (typing, toggles) don't fire a request per keystroke.
  clearTimeout(cloudSyncTimer);
  cloudSyncTimer = setTimeout(pushToCloud, 600);
}

async function pushToCloud(){
  try{
    const res = await fetch(CLOUD_URL, {
      method: "PUT",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(buildLocalSnapshot())
    });
    if(!res.ok) throw new Error("bad response");
    return true;
  }catch(e){
    // Offline — local copy is still safe.
    console.warn("Firebase sync skipped:", e.message);
    return false;
  }
}

async function loadFromCloud(){
  // Pull the shared save down before the app renders, so this device
  // picks up progress made on any other device. Falls back silently
  // to whatever is already in localStorage if the cloud isn't reachable.
  try{
    const res = await fetch(CLOUD_URL);
    if(!res.ok) throw new Error("bad response");
    const remote = await res.json();
    if(remote && typeof remote === "object"){
      Object.keys(remote).forEach(k=>{
        try{ localStorage.setItem(k, JSON.stringify(remote[k])); }catch(e){}
      });
    }
  }catch(e){
    console.warn("Firebase load skipped (offline):", e.message);
  }
}

function mergeLesson(lesson, edits){
  const ov = edits[lesson.id];
  if(!ov) return lesson;
  return {
    ...lesson,
    title: ov.title !== undefined ? ov.title : lesson.title,
    sub: ov.sub !== undefined ? ov.sub : lesson.sub,
    learn: ov.learn !== undefined ? ov.learn : lesson.learn,
    youtubeUrl: ov.youtubeUrl !== undefined ? ov.youtubeUrl : lesson.youtubeUrl
  };
}
function youtubeEmbedId(url){
  if(!url) return null;
  const trimmed = url.trim();
  if(!trimmed) return null;
  try{
    const u = new URL(trimmed);
    const host = u.hostname.replace(/^www\./,"");
    if(host === "youtu.be"){
      return u.pathname.slice(1).split("/")[0] || null;
    }
    if(host === "youtube.com" || host === "m.youtube.com"){
      if(u.pathname === "/watch") return u.searchParams.get("v");
      if(u.pathname.startsWith("/embed/")) return u.pathname.split("/")[2] || null;
      if(u.pathname.startsWith("/shorts/")) return u.pathname.split("/")[2] || null;
    }
  }catch(e){ /* not a valid URL */ }
  return null;
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function allLessons(quarter){
  return quarter.chapters.flatMap(c => c.lessons.map(l => ({...l, chapterTitle:c.title, chapterId:c.id, homeQuarterId:quarter.id})));
}
function allSubjectLessons(subject){
  return subject.quarters.flatMap(q => allLessons(q));
}
function lessonQuarterId(lesson, moves){
  const mv = moves[lesson.id];
  return (mv && mv.quarterId) ? mv.quarterId : lesson.homeQuarterId;
}
function quarterLessons(subject, quarter, moves){
  return allSubjectLessons(subject).filter(l => lessonQuarterId(l, moves) === quarter.id);
}
function quarterLessonCount(subject, quarter, moves){
  return quarterLessons(subject, quarter, moves).length;
}
function quarterLearnedCount(subject, quarter, moves, progress){
  return quarterLessons(subject, quarter, moves).filter(l => progress.lessons[l.id] && progress.lessons[l.id].learned).length;
}
function isQuarterComplete(subject, quarter, moves, progress){
  const lessons = quarterLessons(subject, quarter, moves);
  const allPassed = lessons.length>0 && lessons.every(l => {
    const rec = progress.lessons[l.id];
    return rec && rec.best && (rec.best.correct/rec.best.total) >= 0.7;
  });
  const lq = progress.longQuiz[quarter.id];
  const lqPassed = lq && lq.best && (lq.best.correct/lq.best.total) >= 0.7;
  return allPassed && lqPassed;
}

/* =========================================================
   SOUND ENGINE — tiny synthesized sound effects (Web Audio API).
   No external audio files needed, works offline, respects a mute setting.
   ========================================================= */
let _audioCtx = null;
let _soundOn = true;
function setSoundEnabled(v){ _soundOn = v; }
function getAudioCtx(){
  if(!_audioCtx){
    try{ _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  if(_audioCtx.state === "suspended"){ _audioCtx.resume().catch(()=>{}); }
  return _audioCtx;
}
function _tone(ctx, {freq, start, dur, type="sine", peak=0.15, attack=0.01}){
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, start);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.exponentialRampToValueAtTime(peak, start+attack);
  gain.gain.exponentialRampToValueAtTime(0.0001, start+dur);
  osc.connect(gain).connect(ctx.destination);
  osc.start(start);
  osc.stop(start+dur+0.03);
}
const Sound = {
  tap(){
    if(!_soundOn) return; const ctx = getAudioCtx(); if(!ctx) return;
    _tone(ctx, {freq:540, start:ctx.currentTime, dur:0.07, type:"sine", peak:0.08});
  },
  nav(){
    if(!_soundOn) return; const ctx = getAudioCtx(); if(!ctx) return;
    const t = ctx.currentTime;
    _tone(ctx, {freq:420, start:t, dur:0.08, type:"triangle", peak:0.09});
    _tone(ctx, {freq:640, start:t+0.045, dur:0.1, type:"triangle", peak:0.08});
  },
  back(){
    if(!_soundOn) return; const ctx = getAudioCtx(); if(!ctx) return;
    const t = ctx.currentTime;
    _tone(ctx, {freq:520, start:t, dur:0.08, type:"triangle", peak:0.08});
    _tone(ctx, {freq:360, start:t+0.05, dur:0.1, type:"triangle", peak:0.08});
  },
  select(){
    if(!_soundOn) return; const ctx = getAudioCtx(); if(!ctx) return;
    _tone(ctx, {freq:700, start:ctx.currentTime, dur:0.06, type:"sine", peak:0.07});
  },
  correct(){
    if(!_soundOn) return; const ctx = getAudioCtx(); if(!ctx) return;

    [523.25, 659.25, 783.99].forEach((f,i)=> _tone(ctx, {freq:f, start:t+i*0.085, dur:0.22, type:"sine", peak:0.15}));

  },
  pass(){
    if(!_soundOn) return; const ctx = getAudioCtx(); if(!ctx) return;

    [523.25, 659.25, 783.99, 1046.5].forEach((f,i)=> _tone(ctx, {freq:f, start:t+i*0.1, dur:0.32, type:"triangle", peak:0.15}));
  },
  perfect(){
    if(!_soundOn) return; const ctx = getAudioCtx(); if(!ctx) return;
    const t = ctx.currentTime;
    [523.25, 659.25, 783.99, 1046.5, 1318.51].forEach((f,i)=> _tone(ctx, {freq:f, start:t+i*0.09, dur:0.3, type:"triangle", peak:0.16}));
    [1046.5, 1318.51, 1567.98].forEach((f,i)=> _tone(ctx, {freq:f, start:t+0.55, dur:0.55, type:"sine", peak:0.11}));
  },
  tryAgain(){
    if(!_soundOn) return; const ctx = getAudioCtx(); if(!ctx) return;
    const t = ctx.currentTime;
    [392, 349.23].forEach((f,i)=> _tone(ctx, {freq:f, start:t+i*0.12, dur:0.26, type:"sine", peak:0.11}));

    const t = ctx.currentTime;

/* =========================================================
   QUIZ RUNNER (shared by lesson quiz + long quiz)
   ========================================================= */
function matchesFillAnswer(typed, acceptable){
  const norm = s => String(s||"").trim().toLowerCase().replace(/\s+/g," ");
  const t = norm(typed);
  if(!t) return false;
  return acceptable.some(a => norm(a) === t);
}

// ---- Helpers for the new interactive question types ----
function shuffledIndices(n){
  const arr = Array.from({length:n}, (_,i)=>i);
  return shuffle(arr);
}
function arraysEqual(a,b){
  if(a.length !== b.length) return false;
  for(let i=0;i<a.length;i++){ if(a[i] !== b[i]) return false; }
  return true;
}

function QuizRunner({questions, accent, onFinish, tagLabel, onStop, showStopInline=true}){
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [fillText, setFillText] = useState("");
  const [fillChecked, setFillChecked] = useState(false);
  const [answers, setAnswers] = useState([]);

  // Matching
  const [matchRightOrder, setMatchRightOrder] = useState([]);
  const [matchPicks, setMatchPicks] = useState({}); // leftIdx -> rightIdx (index into shuffled right order)
  const [matchActiveLeft, setMatchActiveLeft] = useState(null);
  const [matchChecked, setMatchChecked] = useState(false);

  // Drag & drop (sort into categories)
  const [ddAssign, setDdAssign] = useState({}); // itemIdx -> category name
  const [ddActiveItem, setDdActiveItem] = useState(null);
  const [ddChecked, setDdChecked] = useState(false);
  const [dragOverCat, setDragOverCat] = useState(null);

  // Ordering / sequencing
  const [orderList, setOrderList] = useState([]); // array of original indices, in current display order
  const [orderChecked, setOrderChecked] = useState(false);

  const q = questions[idx];
  const isLast = idx === questions.length - 1;
  const qType = q.type || "mcq";
  const isFill = qType === "fill";
  const isMatch = qType === "match";
  const isDragDrop = qType === "dragdrop";
  const isOrder = qType === "order";
  const acceptable = isFill ? String(q.answer||"").split("|").map(a=>a.trim()).filter(Boolean) : [];
  const fillIsCorrect = isFill && matchesFillAnswer(fillText, acceptable);

  // Reset/initialize per-question state whenever the question changes
  useEffect(()=>{
    if(isMatch){
      setMatchRightOrder(shuffledIndices((q.pairs||[]).length));
      setMatchPicks({});
      setMatchActiveLeft(null);
      setMatchChecked(false);
    } else if(isDragDrop){
      setDdAssign({});
      setDdActiveItem(null);
      setDdChecked(false);
      setDragOverCat(null);
    } else if(isOrder){
      setOrderList(shuffledIndices((q.items||[]).length));
      setOrderChecked(false);
    }
  }, [idx]);

  const matchAllPicked = isMatch && (q.pairs||[]).length>0 && Object.keys(matchPicks).length === (q.pairs||[]).length;
  const matchIsCorrect = isMatch && matchChecked && (q.pairs||[]).every((_,li)=> matchRightOrder[matchPicks[li]] === li);

  const ddAllAssigned = isDragDrop && (q.items||[]).length>0 && Object.keys(ddAssign).length === (q.items||[]).length;
  const ddIsCorrect = isDragDrop && ddChecked && (q.items||[]).every((it,ii)=> ddAssign[ii] === it.category);

  const orderIsCorrect = isOrder && orderChecked && arraysEqual(orderList, (q.items||[]).map((_,i)=>i));

  const answered = isFill ? fillChecked
    : isMatch ? matchChecked
    : isDragDrop ? ddChecked
    : isOrder ? orderChecked
    : selected !== null;

  function handleSelect(optIdx){
    if(selected !== null) return;
    setSelected(optIdx);
    if(optIdx === q.correct) Sound.correct(); else Sound.incorrect();
  }
  function handleFillCheck(){
    if(fillChecked || !fillText.trim()) return;
    setFillChecked(true);
    if(matchesFillAnswer(fillText, acceptable)) Sound.correct(); else Sound.incorrect();
  }

  // ---- Matching handlers ----
  function handleMatchLeftClick(li){
    if(matchChecked) return;
    setMatchActiveLeft(li);
  }
  function handleMatchRightClick(ri){
    if(matchChecked) return;
    if(matchActiveLeft === null) return;
    setMatchPicks(prev=>{
      const next = {...prev};
      // remove this right slot from any other left it was assigned to
      Object.keys(next).forEach(k=>{ if(next[k]===ri) delete next[k]; });
      next[matchActiveLeft] = ri;
      return next;
    });
    setMatchActiveLeft(null);
  }
  function handleMatchCheck(){
    if(matchChecked || !matchAllPicked) return;
    setMatchChecked(true);
    const allCorrect = (q.pairs||[]).every((_,li)=> matchRightOrder[matchPicks[li]] === li);
    if(allCorrect) Sound.correct(); else Sound.incorrect();
  }

  // ---- Drag & drop handlers ----
  function assignItem(ii, cat){
    if(ddChecked) return;
    setDdAssign(prev=>({...prev, [ii]:cat}));
    setDdActiveItem(null);
  }
  function handleDdItemClick(ii){
    if(ddChecked) return;
    setDdActiveItem(prev => prev===ii ? null : ii);
  }
  function handleDdCategoryClick(cat){
    if(ddChecked || ddActiveItem===null) return;
    assignItem(ddActiveItem, cat);
  }
  function handleDdDragStart(e, ii){
    if(ddChecked) return;
    e.dataTransfer.setData("text/plain", String(ii));
  }
  function handleDdDrop(e, cat){
    e.preventDefault();
    setDragOverCat(null);
    if(ddChecked) return;
    const ii = parseInt(e.dataTransfer.getData("text/plain"), 10);
    if(!Number.isNaN(ii)) assignItem(ii, cat);
  }
  function handleDdCheck(){
    if(ddChecked || !ddAllAssigned) return;
    setDdChecked(true);
    const allCorrect = (q.items||[]).every((it,ii)=> ddAssign[ii] === it.category);
    if(allCorrect) Sound.correct(); else Sound.incorrect();
  }

  // ---- Ordering handlers ----
  function moveOrderItem(pos, dir){
    if(orderChecked) return;
    setOrderList(prev=>{
      const next = prev.slice();
      const target = pos + dir;
      if(target < 0 || target >= next.length) return prev;
      [next[pos], next[target]] = [next[target], next[pos]];
      return next;
    });
  }
  function handleOrderCheck(){
    if(orderChecked) return;
    setOrderChecked(true);
    const correctOrder = (q.items||[]).map((_,i)=>i);
    if(arraysEqual(orderList, correctOrder)) Sound.correct(); else Sound.incorrect();
  }

  function handleNext(){
    Sound.tap();
    let record;
    if(isFill){
      record = {type:"fill", question:q.q, answer:q.answer, chosen:fillText.trim(), isCorrect:fillIsCorrect, tag:q.tag || null};
    } else if(isMatch){
      const chosenPairs = (q.pairs||[]).map((p,li)=>({left:p.left, right: q.pairs[matchRightOrder[matchPicks[li]]].right}));
      record = {type:"match", question:q.q, pairs:q.pairs, chosen:chosenPairs, isCorrect:matchIsCorrect, tag:q.tag || null};
    } else if(isDragDrop){
      record = {type:"dragdrop", question:q.q, items:q.items, categories:q.categories, chosen:{...ddAssign}, isCorrect:ddIsCorrect, tag:q.tag || null};
    } else if(isOrder){
      record = {type:"order", question:q.q, items:q.items, chosen:orderList.map(i=>q.items[i]), isCorrect:orderIsCorrect, tag:q.tag || null};
    } else {
      record = {type:qType, question:q.q, options:q.options, correct:q.correct, chosen:selected, isCorrect: selected===q.correct, tag:q.tag || null};
    }
    const newAnswers = [...answers, record];
    if(isLast){
      onFinish(newAnswers);
    } else {
      setAnswers(newAnswers);
      setIdx(idx+1);
      setSelected(null);
      setFillText("");
      setFillChecked(false);
    }
  }

  return (
    <div style={{width:"110%", marginLeft:"-5%"}}>
      <div className="quiz-progress">
        <span>QUESTION {idx+1} / {questions.length}</span>
        <div className="quiz-dots">
          {questions.map((_,i) => (
            <div key={i} className={"quiz-dot" + (i<=idx ? " filled":"")}></div>
          ))}
        </div>
        <div style={{display:"flex", alignItems:"center", gap:8, marginLeft:10}}>
          {showStopInline && onStop && (
            <button
              className="btn btn-ghost btn-sm"
              title="Stop this quiz"
              onClick={()=>{
                if(window.confirm("Stop this quiz? Your progress on this attempt won't be saved.")){
                  Sound.back();
                  onStop();
                }
              }}
            >✕ Stop Quiz</button>
          )}
          {answered && (
            <button className="btn btn-primary btn-sm" style={{background:accent}} onClick={handleNext}>
              {isLast ? "See Results →" : "Next →"}
            </button>
          )}
        </div>
      </div>
      <div className="quiz-card" key={idx}>
        {q.tag && <div className="quiz-tag">{q.tag}</div>}
        <div className="quiz-q">{q.q}</div>

        {!isFill && !isMatch && !isDragDrop && !isOrder && q.options.map((opt, i) => {
          let cls = "quiz-opt";
          if(selected !== null){
            if(i === q.correct) cls += " correct";
            else if(i === selected) cls += " incorrect";
            else cls += " dimmed";
          }
          return (
            <button key={i} className={cls} disabled={selected!==null} onClick={()=>handleSelect(i)}>
              {opt}
            </button>
          );
        })}

        {isFill && (
          <React.Fragment>
            <input
              className={"quiz-fill-input" + (fillChecked ? (fillIsCorrect ? " correct" : " incorrect") : "")}
              type="text"
              value={fillText}
              disabled={fillChecked}
              placeholder="Type your answer..."
              onChange={e=>setFillText(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter") handleFillCheck(); }}
            />
            {!fillChecked && (
              <div className="quiz-footer" style={{justifyContent:"flex-start", marginTop:-6, marginBottom:10}}>
                <button className="btn btn-ghost btn-sm" onClick={handleFillCheck} disabled={!fillText.trim()}>✓ Check Answer</button>
              </div>
            )}
          </React.Fragment>
        )}

        {isMatch && (
          <React.Fragment>
            <p className="fill-hint">Tap a term on the left, then tap its match on the right.</p>
            <div className="match-wrap">
              <div className="match-col">
                {(q.pairs||[]).map((p,li)=>{
                  const pickedRi = matchPicks[li];
                  const isPicked = pickedRi !== undefined;
                  const isRightAnswer = matchChecked && matchRightOrder[pickedRi] === li;
                  let cls = "match-item";
                  if(matchActiveLeft===li) cls += " active";
                  if(isPicked) cls += " linked";
                  if(matchChecked) cls += isRightAnswer ? " correct" : " incorrect";
                  return (
                    <button key={li} className={cls} disabled={matchChecked} onClick={()=>handleMatchLeftClick(li)}>
                      <span className="match-num">{li+1}</span> {p.left}
                    </button>
                  );
                })}
              </div>
              <div className="match-col">
                {matchRightOrder.map((origIdx, ri)=>{
                  const linkedLeft = Object.keys(matchPicks).find(k=>matchPicks[k]===ri);
                  const isPicked = linkedLeft !== undefined;
                  const isRightAnswer = matchChecked && origIdx === Number(linkedLeft);
                  let cls = "match-item match-item-right";
                  if(isPicked) cls += " linked";
                  if(matchChecked && isPicked) cls += isRightAnswer ? " correct" : " incorrect";
                  return (
                    <button key={ri} className={cls} disabled={matchChecked} onClick={()=>handleMatchRightClick(ri)}>
                      {isPicked && <span className="match-num">{Number(linkedLeft)+1}</span>} {q.pairs[origIdx].right}
                    </button>
                  );
                })}
              </div>
            </div>
            {!matchChecked && (
              <div className="quiz-footer" style={{justifyContent:"flex-start", marginTop:6, marginBottom:10}}>
                <button className="btn btn-ghost btn-sm" onClick={handleMatchCheck} disabled={!matchAllPicked}>✓ Check Matches</button>
              </div>
            )}
          </React.Fragment>
        )}

        {isDragDrop && (
          <React.Fragment>
            <p className="fill-hint">Drag each item into its category (or tap an item, then tap a category).</p>
            <div className="dd-items">
              {(q.items||[]).map((it,ii)=>{
                if(ddAssign[ii] !== undefined) return null;
                return (
                  <div
                    key={ii}
                    className={"dd-chip" + (ddActiveItem===ii ? " active" : "")}
                    draggable={!ddChecked}
                    onDragStart={e=>handleDdDragStart(e, ii)}
                    onClick={()=>handleDdItemClick(ii)}
                  >{it.label}</div>
                );
              })}
              {(q.items||[]).every((it,ii)=>ddAssign[ii]!==undefined) && !ddChecked && (
                <div className="fill-hint" style={{margin:0}}>All items placed — check your answers below.</div>
              )}
            </div>
            <div className="dd-categories">
              {(q.categories||[]).map(cat=>{
                const itemsHere = (q.items||[]).map((it,ii)=>({it,ii})).filter(x=>ddAssign[x.ii]===cat);
                return (
                  <div
                    key={cat}
                    className={"dd-category" + (dragOverCat===cat ? " drag-over" : "")}
                    onClick={()=>handleDdCategoryClick(cat)}
                    onDragOver={e=>{ e.preventDefault(); if(!ddChecked) setDragOverCat(cat); }}
                    onDragLeave={()=>setDragOverCat(prev=> prev===cat ? null : prev)}
                    onDrop={e=>handleDdDrop(e, cat)}
                  >
                    <div className="dd-category-title">{cat}</div>
                    {itemsHere.map(x=>{
                      const isRightAnswer = ddChecked && x.it.category===cat;
                      let cls = "dd-chip dd-chip-placed";
                      if(ddChecked) cls += isRightAnswer ? " correct" : " incorrect";
                      return <div key={x.ii} className={cls} onClick={(e)=>{e.stopPropagation(); handleDdItemClick(x.ii);}}>{x.it.label}</div>;
                    })}
                    {itemsHere.length===0 && <div className="dd-empty">Drop here</div>}
                  </div>
                );
              })}
            </div>
            {!ddChecked && (
              <div className="quiz-footer" style={{justifyContent:"flex-start", marginTop:6, marginBottom:10}}>
                <button className="btn btn-ghost btn-sm" onClick={handleDdCheck} disabled={!ddAllAssigned}>✓ Check Answers</button>
              </div>
            )}
          </React.Fragment>
        )}

        {isOrder && (
          <React.Fragment>
            <p className="fill-hint">Use the arrows to put the steps in the correct order.</p>
            <div className="order-list">
              {orderList.map((origIdx, pos)=>{
                const isRightSpot = orderChecked && origIdx === pos;
                let cls = "order-item";
                if(orderChecked) cls += isRightSpot ? " correct" : " incorrect";
                return (
                  <div key={origIdx} className={cls}>
                    <span className="order-num">{pos+1}</span>
                    <span className="order-label">{q.items[origIdx]}</span>
                    {!orderChecked && (
                      <span className="order-btns">
                        <button type="button" className="order-btn" disabled={pos===0} onClick={()=>moveOrderItem(pos,-1)}>▲</button>
                        <button type="button" className="order-btn" disabled={pos===orderList.length-1} onClick={()=>moveOrderItem(pos,1)}>▼</button>
                      </span>
                    )}
                  </div>
                );
              })}
            </div>
            {!orderChecked && (
              <div className="quiz-footer" style={{justifyContent:"flex-start", marginTop:6, marginBottom:10}}>
                <button className="btn btn-ghost btn-sm" onClick={handleOrderCheck}>✓ Check Order</button>
              </div>
            )}
          </React.Fragment>
        )}

        {answered && (
          <div className={"feedback-box " + ((isFill ? fillIsCorrect : isMatch ? matchIsCorrect : isDragDrop ? ddIsCorrect : isOrder ? orderIsCorrect : selected===q.correct) ? "good":"bad")}>
            {(isFill ? fillIsCorrect : isMatch ? matchIsCorrect : isDragDrop ? ddIsCorrect : isOrder ? orderIsCorrect : selected===q.correct) ? "✅ Correct! " : "❌ Not quite. "}
            {isFill && !fillIsCorrect && ("Correct answer: " + acceptable[0] + ". ")}
            {isOrder && !orderIsCorrect && ("Correct order: " + q.items.join(" → ") + ". ")}
            {q.explain}
          </div>
        )}
      </div>
    </div>
  );
}

const CONFETTI_COLORS = ["var(--q1)","var(--q2)","var(--q3)","var(--q4)","var(--gold)"];
const REWARD_CONFETTI_COLORS = ["var(--aw-cyan)","var(--aw-magenta)","var(--aw-purple)","var(--gold)","#ffffff"];
const PERFECT_CONFETTI_COLORS = ["var(--aw-cyan)","var(--aw-magenta)","var(--aw-purple)","var(--gold)","#ffffff","var(--q1)","var(--q2)","var(--q3)"];
function Confetti({variant, big}){
  const palette = variant === "perfect" ? PERFECT_CONFETTI_COLORS : variant === "reward" ? REWARD_CONFETTI_COLORS : CONFETTI_COLORS;
  const count = big ? 90 : 18;
  const pieces = React.useMemo(()=>Array.from({length:count}, (_,i)=>{
    const dir = Math.random()>0.5 ? 1 : -1;
    const spread = big ? 220 : 60;
    return {
      left: big ? Math.random()*100 : 4 + Math.random()*92,
      dxMid: (dir * (10 + Math.random()*spread*0.6))+"px",
      dx: (dir * (Math.random()*spread))+"px",
      rotMid: (Math.random()*260+120)+"deg",
      rot: (Math.random()*680+260)+"deg",
      delay: (Math.random()*(big?0.6:0.25))+"s",
      dur: (big ? 1.8+Math.random()*1.1 : 1.1+Math.random()*0.6)+"s",
      color: palette[i % palette.length],
      round: Math.random()>0.5
    };
  }), [variant, big, count]);
  return (
    <div className={"confetti-wrap" + (big ? " big" : "")} aria-hidden="true">
      {pieces.map((p,i)=>(
        <div key={i} className="confetti-piece" style={{
          left:p.left+"%", background:p.color,
          borderRadius: p.round ? "50%" : "2px",
          animationDelay:p.delay, animationDuration:p.dur,
          "--dx":p.dx, "--dxMid":p.dxMid, "--rot":p.rot, "--rotMid":p.rotMid
        }}/>
      ))}
    </div>
  );
}
function ResultsView({answers, accent, onRetry, onDone, title}){
  const total = answers.length;
  const correct = answers.filter(a => a.isCorrect).length;
  const pct = Math.round((correct/total)*100);
  const passed = pct >= 70;
  const isPerfect = total > 0 && correct === total;
  React.useEffect(()=>{ isPerfect ? Sound.perfect() : passed ? Sound.pass() : Sound.tryAgain(); }, []);
  return (
    <div className={"results-card" + (passed ? " reward" : "")}>
      {passed && <Confetti variant={isPerfect ? "perfect" : "reward"} big={isPerfect}/>}
      {isPerfect && <div className="perfect-badge">🎉 Perfect Score! 🎉</div>}
      {passed && !isPerfect && <div className="levelup-badge">⚡ Level Up!</div>}
      <div className={"results-emoji" + (isPerfect ? " perfect" : "")}>{isPerfect ? "🏆" : passed ? "🌟" : "🔍"}</div>
      <div className="results-score" style={{color: passed ? undefined : accent}}>{correct} / {total}</div>
      <div className="results-sub">
        {isPerfect ? "Flawless! You got every question right in " + title + "." : passed ? "Great work! You passed " + title + "." : "Keep practicing — review " + title + " and try again."}
      </div>
      <div className="review-list">
        {answers.map((a, i) => (
          <div className="review-item" key={i} style={{animationDelay:Math.min(i*0.04,0.5)+"s"}}>
            {a.tag && <div className="rtag">{a.tag}</div>}
            <div className="rq">{i+1}. {a.question}</div>
            {a.type === "fill" ? (
              <React.Fragment>
                <div className={"ra " + (a.isCorrect ? "right":"wrong")}>
                  Your answer: {a.chosen || "(blank)"} {a.isCorrect ? "✓" : "✗"}
                </div>
                {!a.isCorrect && <div className="ra right">Correct answer: {String(a.answer||"").split("|")[0].trim()}</div>}
              </React.Fragment>
            ) : a.type === "match" ? (
              <React.Fragment>
                <div className={"ra " + (a.isCorrect ? "right":"wrong")}>
                  {a.isCorrect ? "All matched correctly ✓" : "Some matches were wrong ✗"}
                </div>
                {!a.isCorrect && a.pairs.map((p,pi)=>(<div key={pi} className="ra right">{p.left} → {p.right}</div>))}
              </React.Fragment>
            ) : a.type === "dragdrop" ? (
              <React.Fragment>
                <div className={"ra " + (a.isCorrect ? "right":"wrong")}>
                  {a.isCorrect ? "All items sorted correctly ✓" : "Some items were in the wrong category ✗"}
                </div>
                {!a.isCorrect && a.items.map((it,ii)=>(<div key={ii} className="ra right">{it.label} → {it.category}</div>))}
              </React.Fragment>
            ) : a.type === "order" ? (
              <React.Fragment>
                <div className={"ra " + (a.isCorrect ? "right":"wrong")}>
                  Your order: {a.chosen.join(" → ")} {a.isCorrect ? "✓" : "✗"}
                </div>
                {!a.isCorrect && <div className="ra right">Correct order: {a.items.join(" → ")}</div>}
              </React.Fragment>
            ) : (
              <React.Fragment>
                <div className={"ra " + (a.isCorrect ? "right":"wrong")}>
                  Your answer: {a.options[a.chosen]} {a.isCorrect ? "✓" : "✗"}
                </div>
                {!a.isCorrect && <div className="ra right">Correct answer: {a.options[a.correct]}</div>}
              </React.Fragment>
            )}
          </div>
        ))}
      </div>
      <div className="results-actions">
        <button className="btn btn-ghost" onClick={onRetry}>↻ Try Again</button>
        <button className="btn btn-primary" style={{background:accent}} onClick={onDone}>Done</button>
      </div>
    </div>
  );
}

/* =========================================================
   QUESTION BANK MANAGER — teacher inputs MCQs per topic
   ========================================================= */
const TOPIC_ALL = "__all__";
function normTopic(t){
  return (t || "").trim();
}
function bankTopics(questions){
  const set = new Set();
  (questions||[]).forEach(q=>{ if(normTopic(q.topic)) set.add(normTopic(q.topic)); });
  return Array.from(set).sort((a,b)=>a.localeCompare(b));
}
// selectedTopics is an array; [TOPIC_ALL] means "every topic".
function toggleTopicSelection(selectedTopics, t, setSelectedTopics){
  if(t === TOPIC_ALL){ setSelectedTopics([TOPIC_ALL]); return; }
  let next = selectedTopics.includes(TOPIC_ALL) ? [] : selectedTopics.slice();
  next = next.includes(t) ? next.filter(x=>x!==t) : [...next, t];
  setSelectedTopics(next.length ? next : [TOPIC_ALL]);
}
function filterByTopics(questions, selectedTopics){
  if(!selectedTopics || selectedTopics.includes(TOPIC_ALL)) return questions;
  return questions.filter(q=>selectedTopics.includes(normTopic(q.topic)));
}
// Reusable multi-select topic checklist with a "select all" option.
function TopicPicker({topics, totalCount, selected, onToggle}){
  return (
    <div className="topic-picker">
      <label className="topic-all">
        <input type="checkbox" checked={selected.includes(TOPIC_ALL)} onChange={()=>onToggle(TOPIC_ALL)} />
        <span>All Topics ({totalCount})</span>
      </label>
      {topics.map(({name, count})=>(
        <label key={name}>
          <input type="checkbox" checked={!selected.includes(TOPIC_ALL) && selected.includes(name)} onChange={()=>onToggle(name)} />
          <span>{name} ({count})</span>
        </label>
      ))}
    </div>
  );
}

const QUESTION_TYPES = [
  {id:"mcq", label:"🔤 Multiple Choice"},
  {id:"tf", label:"✅ True / False"},
  {id:"fill", label:"✍️ Fill in the Blank"},
  {id:"match", label:"🔗 Matching"},
  {id:"dragdrop", label:"🧩 Drag and Drop"},
  {id:"order", label:"📋 Ordering / Sequencing"}
];

// ---- Quiz-start question-type filter (pure MCQ / pure True-False / pure Fill-in / all types) ----
const TYPE_ALL = "__all__";
const QUIZ_TYPE_OPTIONS = [
  {id:TYPE_ALL, label:"🎲 All Types"},
  {id:"mcq", label:"🔤 Multiple Choice"},
  {id:"tf", label:"✅ True / False"},
  {id:"fill", label:"✍️ Fill in the Blank"},
  {id:"match", label:"🔗 Matching"},
  {id:"dragdrop", label:"🧩 Drag and Drop"},
  {id:"order", label:"📋 Ordering / Sequencing"}
];
function filterByType(questions, selectedType){
  if(!selectedType || selectedType === TYPE_ALL) return questions;
  return questions.filter(q => (q.type || "mcq") === selectedType);
}
// Reusable single-select pill row for choosing which question type(s) a quiz should draw from.
// Only shows pills for types that actually have questions in the pool, plus "All Types".
function QuizTypePicker({pool, selected, onSelect}){
  const availTypes = QUESTION_TYPES.filter(t => pool.some(q => (q.type || "mcq") === t.id));
  if(availTypes.length < 2) return null; // nothing to choose between
  const options = [QUIZ_TYPE_OPTIONS[0], ...QUIZ_TYPE_OPTIONS.slice(1).filter(o => availTypes.some(t=>t.id===o.id))];
  return (
    <div className="type-picker">
      {options.map(o=>(
        <button
          type="button"
          key={o.id}
          className={"type-pill" + (selected===o.id ? " active" : "")}
          onClick={()=>onSelect(o.id)}
        >{o.label}</button>
      ))}
    </div>
  );
}

function QuestionBankManager({lessonId, questions, accent, onChange}){
  const [bulkText, setBulkText] = useState("");
  const [bulkTopic, setBulkTopic] = useState("");
  const [selected, setSelected] = useState(new Set());

  const topics = bankTopics(questions);
  const noTopicCount = questions.filter(q=>!normTopic(q.topic)).length;
  const allSelected = questions.length > 0 && selected.size === questions.length;

  function toggleSelect(i){
    setSelected(prev=>{
      const next = new Set(prev);
      if(next.has(i)) next.delete(i); else next.add(i);
      return next;
    });
  }
  function toggleSelectAll(){
    setSelected(allSelected ? new Set() : new Set(questions.map((_,i)=>i)));
  }

  function handleDeleteOne(i){
    if(!confirm("Delete this question?")) return;
    const next = questions.slice();
    next.splice(i,1);
    onChange(next);
    setSelected(prev=>{
      const shifted = new Set();
      prev.forEach(idx=>{ if(idx!==i) shifted.add(idx>i ? idx-1 : idx); });
      return shifted;
    });
  }

  function handleDeleteSelected(){
    if(selected.size===0) return;
    if(!confirm("Delete " + selected.size + " selected question(s)?")) return;
    onChange(questions.filter((_,i)=>!selected.has(i)));
    setSelected(new Set());
  }

  function handleDeleteAll(){
    if(questions.length===0) return;
    if(!confirm("Delete all " + questions.length + " questions in this bank? This can't be undone.")) return;
    onChange([]);
    setSelected(new Set());
  }

  function handleDeleteTopic(topic){
    const label = topic ? topic : "No topic";
    const count = questions.filter(q=>normTopic(q.topic)===topic).length;
    if(count===0) return;
    if(!confirm("Delete all " + count + " question(s) in \"" + label + "\"?")) return;
    onChange(questions.filter(q=>normTopic(q.topic)!==topic));
    setSelected(new Set());
  }

  function triggerDownload(filename, data){
    try{
      const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 200);
    }catch(e){ alert("Couldn't create that download."); }
  }

  function slugify(s){
    return String(s||"").toLowerCase().trim().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"") || "questions";
  }

  function handleDownloadTopic(topic){
    const list = questions.filter(q=>normTopic(q.topic)===topic);
    if(!list.length) return;
    triggerDownload(slugify(lessonId) + "-" + slugify(topic || "no-topic") + ".json", list);
  }

  function handleDownloadAll(){
    if(!questions.length) return;
    triggerDownload(slugify(lessonId) + "-all-questions.json", questions);
  }

  function handleBulkImport(mode){
    let parsed;
    try{
      parsed = JSON.parse(bulkText);
      if(!Array.isArray(parsed)) throw new Error("not an array");
    }catch(e){
      alert("Couldn't read that as a JSON list of questions. Expected format:\n[{\"q\":\"...\", \"options\":[\"A\",\"B\",\"C\",\"D\"], \"correct\":0, \"explain\":\"...\"}]\nAlso supports tf, fill, match, dragdrop, and order types — see the format notes below the bank.");
      return;
    }
    const fallbackTopic = normTopic(bulkTopic);
    const cleaned = parsed.filter(p=>{
      if(!p || !p.q) return false;
      const t = String(p.type||"mcq").toLowerCase();
      if(t === "fill" || t === "fillblank" || t === "fill_in_the_blank") return !!p.answer;
      if(t === "tf" || t === "truefalse" || t === "true_false") return true;
      if(t === "match" || t === "matching") return Array.isArray(p.pairs) && p.pairs.length >= 2 && p.pairs.every(pr=>pr && pr.left && pr.right);
      if(t === "dragdrop" || t === "drag_and_drop" || t === "drag-drop" || t === "sort"){
        return Array.isArray(p.categories) && p.categories.length >= 2 && Array.isArray(p.items) && p.items.length >= 2
          && p.items.every(it=>it && it.label && p.categories.includes(it.category));
      }
      if(t === "order" || t === "sequence" || t === "sequencing" || t === "ordering") return Array.isArray(p.items) && p.items.length >= 2;
      return Array.isArray(p.options) && p.options.length >= 2;
    }).map(p=>{
      const t = String(p.type||"mcq").toLowerCase();
      const topic = normTopic(p.topic) || fallbackTopic;
      if(t === "fill" || t === "fillblank" || t === "fill_in_the_blank"){
        return {type:"fill", q:String(p.q), answer:String(p.answer), explain: p.explain ? String(p.explain) : "", topic};
      }
      if(t === "tf" || t === "truefalse" || t === "true_false"){
        let correct = 0;
        if(typeof p.correct === "boolean") correct = p.correct ? 0 : 1;
        else if(Number.isInteger(p.correct)) correct = p.correct;
        else if(typeof p.correct === "string") correct = /^false$/i.test(p.correct.trim()) ? 1 : 0;
        return {type:"tf", q:String(p.q), options:["True","False"], correct, explain: p.explain ? String(p.explain) : "", topic};
      }
      if(t === "match" || t === "matching"){
        return {type:"match", q:String(p.q), pairs:p.pairs.map(pr=>({left:String(pr.left), right:String(pr.right)})), explain: p.explain ? String(p.explain) : "", topic};
      }
      if(t === "dragdrop" || t === "drag_and_drop" || t === "drag-drop" || t === "sort"){
        return {type:"dragdrop", q:String(p.q), categories:p.categories.map(c=>String(c)), items:p.items.map(it=>({label:String(it.label), category:String(it.category)})), explain: p.explain ? String(p.explain) : "", topic};
      }
      if(t === "order" || t === "sequence" || t === "sequencing" || t === "ordering"){
        return {type:"order", q:String(p.q), items:p.items.map(it=>String(it)), explain: p.explain ? String(p.explain) : "", topic};
      }
      return {type:"mcq", q:String(p.q), options:p.options.map(o=>String(o)), correct: Number.isInteger(p.correct)?p.correct:0, explain: p.explain ? String(p.explain) : "", topic};
    });
    if(!cleaned.length){ alert("No valid questions found in that JSON."); return; }
    const next = mode === "replace" ? cleaned : [...questions, ...cleaned];
    onChange(next);
    setBulkText("");
    setBulkTopic("");
    setSelected(new Set());
  }

  return (
    <div className="journal-page">
      <h3>Question Bank {questions.length ? "(" + questions.length + ")" : ""}</h3>
      {questions.length === 0 && <p className="sub">No questions yet. Paste a JSON list below to add multiple choice, true/false, fill-in-the-blank, matching, drag-and-drop, or ordering questions.</p>}

      {questions.length > 0 && (
        <div className="bank-toolbar">
          <label className="bank-selectall">
            <input type="checkbox" checked={allSelected} onChange={toggleSelectAll} />
            <span>{selected.size>0 ? selected.size + " selected" : "Select all"}</span>
          </label>
          <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
            {selected.size>0 && (
              <button className="btn btn-ghost btn-sm" onClick={handleDeleteSelected}>🗑️ Delete Selected ({selected.size})</button>
            )}
            <button className="btn btn-ghost btn-sm" onClick={handleDownloadAll}>⬇️ Download All JSON</button>
            <button className="btn btn-ghost btn-sm" style={{color:"var(--bad)"}} onClick={handleDeleteAll}>🗑️ Delete All</button>
          </div>
        </div>
      )}

      {(topics.length > 0 || noTopicCount > 0) && (
        <div className="bank-topic-tools">
          <label className="field-label" style={{marginTop:0}}>Manage by topic</label>
          {topics.map(t=>{
            const count = questions.filter(q=>normTopic(q.topic)===t).length;
            return (
              <div key={t} className="bank-topic-row">
                <span className="bank-topic-name">🏷️ {t} ({count})</span>
                <div style={{display:"flex", gap:8}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>handleDownloadTopic(t)}>⬇️ Download</button>
                  <button className="btn btn-ghost btn-sm" style={{color:"var(--bad)"}} onClick={()=>handleDeleteTopic(t)}>🗑️ Delete All</button>
                </div>
              </div>
            );
          })}
          {noTopicCount > 0 && (
            <div className="bank-topic-row">
              <span className="bank-topic-name">No topic ({noTopicCount})</span>
              <div style={{display:"flex", gap:8}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>handleDownloadTopic("")}>⬇️ Download</button>
                <button className="btn btn-ghost btn-sm" style={{color:"var(--bad)"}} onClick={()=>handleDeleteTopic("")}>🗑️ Delete All</button>
              </div>
            </div>
          )}
        </div>
      )}

      {questions.map((q,i)=>{
        const t = q.type || "mcq";
        const typeLabel = t === "fill" ? "✍️ Fill in the Blank"
          : t === "tf" ? "✅ True / False"
          : t === "match" ? "🔗 Matching"
          : t === "dragdrop" ? "🧩 Drag and Drop"
          : t === "order" ? "📋 Ordering / Sequencing"
          : "🔤 Multiple Choice";
        return (
          <div key={i} className={"bank-item" + (selected.has(i) ? " bank-item-selected" : "")}>
            <label className="bank-item-select">
              <input type="checkbox" checked={selected.has(i)} onChange={()=>toggleSelect(i)} />
            </label>
            <div className="bank-item-body">
              <div className="bank-item-type">{typeLabel}{normTopic(q.topic) ? " · 🏷️ " + normTopic(q.topic) : ""}</div>
              <div className="bank-item-q">{i+1}. {q.q}</div>
              {t === "fill" && (
                <div className="bank-item-opts">
                  <span className="bank-opt bank-opt-correct">{q.answer}</span>
                </div>
              )}
              {t === "match" && (
                <div className="bank-item-opts">
                  {q.pairs.map((p,pi)=>(
                    <span key={pi} className="bank-opt bank-opt-correct">{p.left} → {p.right}</span>
                  ))}
                </div>
              )}
              {t === "dragdrop" && (
                <div className="bank-item-opts">
                  {q.items.map((it,ii)=>(
                    <span key={ii} className="bank-opt bank-opt-correct">{it.label} → {it.category}</span>
                  ))}
                </div>
              )}
              {t === "order" && (
                <div className="bank-item-opts">
                  <span className="bank-opt bank-opt-correct">{q.items.join(" → ")}</span>
                </div>
              )}
              {(t === "mcq" || t === "tf") && (
                <div className="bank-item-opts">
                  {q.options.map((o,oi)=>(
                    <span key={oi} className={"bank-opt" + (oi===q.correct ? " bank-opt-correct":"")}>{o}</span>
                  ))}
                </div>
              )}
              <div className="bank-item-actions">
                <button className="btn btn-ghost btn-sm" onClick={()=>handleDeleteOne(i)}>🗑️ Delete</button>
              </div>
            </div>
          </div>
        );
      })}

      <div style={{marginTop:24}}>
        <h3>➕ Bulk Import from JSON</h3>
        <p className="sub">Paste an array of questions. Multiple choice: {"[{\"q\":\"...\",\"options\":[\"A\",\"B\",\"C\",\"D\"],\"correct\":0,\"explain\":\"...\",\"topic\":\"Comparing\"}]"}</p>
        <p className="sub">True/False: {"[{\"type\":\"tf\",\"q\":\"...\",\"correct\":0,\"explain\":\"...\",\"topic\":\"Ordering\"}]"} (correct: 0 = True, 1 = False)</p>
        <p className="sub">Fill in the blank: {"[{\"type\":\"fill\",\"q\":\"...\",\"answer\":\"...\",\"explain\":\"...\",\"topic\":\"Rounding\"}]"}</p>
        <p className="sub">🔗 Matching: {"[{\"type\":\"match\",\"q\":\"Match the word to its picture clue\",\"pairs\":[{\"left\":\"Cat\",\"right\":\"Meow\"},{\"left\":\"Dog\",\"right\":\"Woof\"}],\"explain\":\"...\",\"topic\":\"Animals\"}]"}</p>
        <p className="sub">🧩 Drag and Drop: {"[{\"type\":\"dragdrop\",\"q\":\"Sort into Fruits and Vegetables\",\"categories\":[\"Fruit\",\"Vegetable\"],\"items\":[{\"label\":\"Apple\",\"category\":\"Fruit\"},{\"label\":\"Carrot\",\"category\":\"Vegetable\"}],\"explain\":\"...\",\"topic\":\"Food\"}]"} (each item's "category" must exactly match one of the "categories")</p>
        <p className="sub">📋 Ordering / Sequencing: {"[{\"type\":\"order\",\"q\":\"Put your morning routine in order\",\"items\":[\"Wake up\",\"Brush teeth\",\"Eat breakfast\",\"Go to school\"],\"explain\":\"...\",\"topic\":\"Daily Routines\"}]"} (list "items" in the correct order — they'll be shuffled for the student)</p>
        <p className="sub">"topic" is optional on all types — leave it out (or empty) for questions with no topic.</p>
        <label className="field-label">Topic for this batch (optional)</label>
        <input className="text-input" list="topic-suggestions" value={bulkTopic} onChange={e=>setBulkTopic(e.target.value)} placeholder="e.g. Comparing — applied to any question below with no topic of its own" />
        <datalist id="topic-suggestions">
          {topics.map(t=>(<option key={t} value={t} />))}
        </datalist>
        <p className="fill-hint">If a question in the JSON already has its own "topic", that's kept. Otherwise this batch topic is used. Leave blank for no topic.</p>
        <textarea className="text-area" rows={8} value={bulkText} onChange={e=>setBulkText(e.target.value)} placeholder="Paste JSON array here..."></textarea>
        <div className="learn-footer" style={{gap:10}}>
          <button className="btn btn-ghost" onClick={()=>handleBulkImport("append")}>➕ Append to Bank</button>
          <button className="btn btn-primary" style={{background:accent}} onClick={()=>handleBulkImport("replace")}>♻️ Replace Entire Bank</button>
        </div>
      </div>
    </div>
  );
}

/* =========================================================
   MAIN APP
   ========================================================= */

function App(){
  const [progress, setProgress] = useState(loadProgress());
  const [edits, setEdits] = useState(loadEdits());
  const [bank, setBank] = useState(loadBank());
  const [moves, setMoves] = useState(loadMoves());
  const [settings, setSettings] = useState(loadSettings());
  const [notes, setNotes] = useState(loadNotes());
  const [activity, setActivity] = useState(loadActivity());
  const [nav, setNav] = useState({screen:"dashboard"});
  const [quizSession, setQuizSession] = useState(null); // {kind:'lesson'|'long', questions, accent, title, key}
  const [saveFlash, setSaveFlash] = useState(false);

  useEffect(()=>{ saveProgress(progress); }, [progress]);
  useEffect(()=>{ saveEdits(edits); }, [edits]);
  useEffect(()=>{ saveBank(bank); }, [bank]);
  useEffect(()=>{ saveMoves(moves); }, [moves]);
  useEffect(()=>{ saveSettings(settings); }, [settings]);
  useEffect(()=>{ saveNotes(notes); }, [notes]);
  useEffect(()=>{ saveActivity(activity); }, [activity]);
  useEffect(()=>{ setSoundEnabled(settings.soundEnabled !== false); }, [settings.soundEnabled]);

  async function saveEverythingNow(){
    Sound.save();
    saveProgress(progress); saveEdits(edits); saveBank(bank); saveMoves(moves);
    saveSettings(settings); saveNotes(notes); saveActivity(activity);
    // Skip the debounce and push the full snapshot to Firebase right away.
    clearTimeout(cloudSyncTimer);
    const cloudOk = await pushToCloud();
    setSaveFlash(cloudOk ? "✅ Saved to Firebase!" : "⚠️ Saved on this device only (offline)");
    setTimeout(()=>setSaveFlash(false), 1800);
  }

  function logLessonLearned(lessonId){
    setActivity(prev => {
      const today = todayStr();
      if(prev.some(a=>a.type==="lesson" && a.date===today && a.lessonId===lessonId)) return prev;
      return [...prev, {type:"lesson", date:today, lessonId, ts:Date.now()}];
    });
  }
  function logQuestionsAnswered(count){
    setActivity(prev => [...prev, {type:"questions", date:todayStr(), count, ts:Date.now()}]);
  }
  function updateSettings(patch){
    setSettings(prev => ({...prev, ...patch}));
  }
  function addNote(text){
    const t = text.trim();
    if(!t) return;
    setNotes(prev => [{id:"n"+Date.now(), text:t, createdAt:Date.now()}, ...prev]);
  }
  function deleteNote(id){
    setNotes(prev => prev.filter(n=>n.id!==id));
  }

  function saveLessonEdit(lessonId, data){
    setEdits(prev => ({...prev, [lessonId]: data}));
  }
  function setLessonQuestions(lessonId, questions){
    setBank(prev => ({...prev, [lessonId]: questions}));
  }
  function getQuestions(lessonId){
    return bank[lessonId] || [];
  }
  function moveLesson(lessonId, quarterId){
    setMoves(prev => ({...prev, [lessonId]: {quarterId}}));
  }

  function currentSubject(){ return SUBJECTS.find(s=>s.id===nav.subjectId); }

  function goDashboard(){ Sound.back(); setNav({screen:"dashboard"}); setQuizSession(null); }
  function goNotes(){ Sound.nav(); setNav({screen:"notes"}); setQuizSession(null); }
  function goSubjects(){ Sound.back(); setNav({screen:"subjects"}); setQuizSession(null); }
  function goSubjectHome(sid){ Sound.nav(); setNav({screen:"home", subjectId:sid}); setQuizSession(null); }
  function goQuarter(sid, qid){ Sound.nav(); setNav({screen:"quarter", subjectId:sid, quarterId:qid}); setQuizSession(null); }
  function goLesson(sid, qid, lid){ Sound.nav(); setNav({screen:"lesson", subjectId:sid, quarterId:qid, lessonId:lid, tab:"learn"}); setQuizSession(null); }

  function markLearned(lessonId){
    Sound.unlock();
    const wasLearned = !!(progress.lessons[lessonId] && progress.lessons[lessonId].learned);
    setProgress(prev => {
      const next = {...prev, lessons:{...prev.lessons}};
      const rec = next.lessons[lessonId] || {};
      next.lessons[lessonId] = {...rec, learned:true};
      return next;
    });
    logLessonLearned(lessonId);
  }

  function startLessonQuiz(quarter, lesson, count, topics, qType){
    Sound.nav();
    let pool = filterByTopics(getQuestions(lesson.id), topics);
    pool = filterByType(pool, qType);
    const n = Math.max(1, Math.min(count || pool.length, pool.length));
    setQuizSession({
      kind:"lesson", key:lesson.id, accent:quarter.color, title: lesson.title,
      questions: shuffle(pool).slice(0, n)
    });
  }
  function startLongQuiz(quarter, count, topics, qType){
    Sound.nav();
    const subject = currentSubject();
    const lessons = quarterLessons(subject, quarter, moves);
    let pool = lessons.flatMap(l => getQuestions(l.id).map(q => ({...q, tag: mergeLesson(l, edits).title})));
    pool = filterByTopics(pool, topics);
    pool = filterByType(pool, qType);
    const n = Math.max(1, Math.min(count || pool.length, pool.length));
    setQuizSession({
      kind:"long", key:quarter.id, accent:quarter.color, title: quarter.title + " Long Quiz",
      questions: shuffle(pool).slice(0, n)
    });
  }

  function handleQuizFinish(answers){
    const correct = answers.filter(a=>a.isCorrect).length;
    const total = answers.length;
    const ratio = total ? correct/total : 0;
    const passed = ratio >= 0.7;
    const bucket = quizSession.kind === "lesson" ? progress.lessons : progress.longQuiz;
    const prevRec = bucket[quizSession.key];
    const prevRatio = prevRec && prevRec.best ? prevRec.best.correct/prevRec.best.total : -1;
    const prevPassed = prevRatio >= 0.7;
    const isNewBest = ratio > prevRatio;

    setProgress(prev=>{
      const next = {...prev};
      if(quizSession.kind === "lesson"){
        next.lessons = {...prev.lessons};
        const rec = next.lessons[quizSession.key] || {};
        const best = rec.best && rec.best.correct/rec.best.total >= correct/total ? rec.best : {correct,total};
        next.lessons[quizSession.key] = {...rec, best, last:{correct,total}};
      } else {
        next.longQuiz = {...prev.longQuiz};
        const rec = next.longQuiz[quizSession.key] || {};
        const best = rec.best && rec.best.correct/rec.best.total >= correct/total ? rec.best : {correct,total};
        next.longQuiz[quizSession.key] = {...rec, best, last:{correct,total}};
      }
      return next;
    });
    logQuestionsAnswered(total);

    setQuizSession(sess => ({...sess, finalAnswers: answers}));
  }

  /* ---------------- helpers across a whole subject ---------------- */
  function subjectLessonCount(subject){
    return allSubjectLessons(subject).length;
  }
  function subjectLearnedCount(subject, progress){
    return allSubjectLessons(subject).filter(l => progress.lessons[l.id] && progress.lessons[l.id].learned).length;
  }

  /* ---------------- DASHBOARD SCREEN (app home) ---------------- */
  function DashboardScreen(){
    const totals = SUBJECTS.reduce((acc,s)=>{
      acc.learned += subjectLearnedCount(s, progress);
      acc.total += subjectLessonCount(s);
      return acc;
    }, {learned:0, total:0});
    const overallPct = totals.total ? Math.round((totals.learned/totals.total)*100) : 0;

    return (
      <React.Fragment>
        <div className="passport">
          <div className="passport-title">Welcome back</div>
          <div className="passport-name">👋 Hi, Charlie!</div>
          <div className="field-label" style={{color:"#C9C2FF", margin:"0 0 6px"}}>Overall Progress — {overallPct}%</div>
          <div className="progress-track" style={{background:"rgba(237,231,214,0.14)", boxShadow:"inset 0 1px 3px rgba(0,0,0,0.3), 0 0 10px rgba(53,242,224,0.25)"}}>
            <div className="progress-fill" style={{width:overallPct+"%", background:"linear-gradient(90deg, var(--aw-cyan), var(--aw-magenta))", boxShadow:"0 0 10px rgba(53,242,224,0.6)"}}></div>
          </div>
          <div className="smeta" style={{color:"#C9C2FF", marginTop:8}}>{totals.learned}/{totals.total} topics learned across all subjects</div>
        </div>

        <div className="section-title">Subjects</div>
        <div className="subject-square-grid">
          {SUBJECTS.map((s,si)=>{
            const learned = subjectLearnedCount(s, progress);
            const total = subjectLessonCount(s);
            return (
              <button key={s.id} className={"subject-square" + (learned===total && total>0 ? " complete":"")} onClick={()=>goSubjectHome(s.id)} style={{animationDelay:(si*0.05)+"s"}}>
                <div className="sq-icon">{s.icon}</div>
                <div className="sq-label">{s.shortName}</div>
                <div className="sq-frac" style={{color:s.color}}>{learned}/{total}</div>
              </button>
            );
          })}
        </div>

        <div className="footer-note">SACRED HEART ACADEMY OF PASIG · GRADE SCHOOL DEPARTMENT</div>
      </React.Fragment>
    );
  }

  /* ---------------- NOTES SCREEN ---------------- */
  function NotesScreen(){
    const [draft, setDraft] = useState("");
    return (
      <React.Fragment>
        <div className="backbar">
          <button className="backbtn" onClick={goDashboard}>←</button>
          <div>
            <div className="qnum">Journal</div>
            <h1 style={{margin:0, fontSize:"22px"}}>📝 My Notes</h1>

        <div className="journal-page">

          <div className="learn-footer" style={{gap:10}}>

        </div>
        <div className="section-title">Saved Notes</div>

          <div key={n.id} className="subject-card" style={{cursor:"default"}}>

            <div className="smeta" style={{marginTop:8, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <span>{new Date(n.createdAt).toLocaleString()}</span>
              <button className="btn btn-ghost" style={{padding:"6px 12px"}} onClick={()=>deleteNote(n.id)}>Delete</button>
            </div>
          </div>
        ))}
        <div className="footer-note">SACRED HEART ACADEMY OF PASIG · GRADE SCHOOL DEPARTMENT</div>
      </React.Fragment>
    );
  }

  /* ---------------- SUBJECTS SCREEN (top-level home) ---------------- */
  function SubjectsScreen(){
    return (
      <React.Fragment>
        <div className="passport">
          <div className="passport-title">Grade 2 Learning Passport</div>
          <div className="passport-name">SY 2026–2027 · Sacred Heart Academy of Pasig</div>
          <div className="stamp-row">
            {SUBJECTS.map(s=>{

                <button key={s.id} className={"stamp" + (learned===total && total>0 ? " complete":"")} onClick={()=>goSubjectHome(s.id)}>
                  <div className="icon">{s.icon}</div>

                  <div className="frac">{learned}/{total}</div>

  function SubjectHomeScreen(){

        <div className="backbar">
