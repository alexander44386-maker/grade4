  /* ---------------- QUARTER SCREEN ---------------- */
  function QuarterScreen(){
    const subject = currentSubject();
    const quarter = subject.quarters.find(q=>q.id===nav.quarterId);
    const [showSetup, setShowSetup] = useState(false);
    const lessons = quarterLessons(subject, quarter, moves);
    const nativeLessons = lessons.filter(l=>l.homeQuarterId===quarter.id);
    const movedInLessons = lessons.filter(l=>l.homeQuarterId!==quarter.id);
    const totalBankQ = lessons.reduce((sum,l)=>sum+getQuestions(l.id).length, 0);
    const [longCount, setLongCount] = useState(Math.min(10, totalBankQ) || 1);
    const [longTopics, setLongTopics] = useState([TOPIC_ALL]);
    const [longType, setLongType] = useState(TYPE_ALL);
    const longFullPool = lessons.flatMap(l=>getQuestions(l.id));
    const longAvailTopics = bankTopics(longFullPool);
    const longAvailTopicsWithCounts = longAvailTopics.map(t=>({name:t, count: longFullPool.filter(q=>normTopic(q.topic)===t).length}));
    const longTopicPool = filterByTopics(longFullPool, longTopics);
    const longFilteredCount = filterByType(longTopicPool, longType).length;
    let counter = 0;

    useEffect(()=>{ setLongCount(Math.min(10, longFilteredCount) || 1); }, [longTopics, longType, longFilteredCount]);
    useEffect(()=>{ setLongType(TYPE_ALL); }, [longTopics]);

    function renderLessonCard(l0, moved){
      counter++;
      const l = mergeLesson(l0, edits);
      const rec = progress.lessons[l.id];
      const learned = rec && rec.learned;
      const best = rec && rec.best;
      const qCount = getQuestions(l.id).length;
      return (
        <button key={l.id} className="lesson-card" style={{width:"100%", border:"2px solid var(--line)", background:"#fff", animationDelay:Math.min(counter*0.04,0.4)+"s"}} onClick={()=>goLesson(subject.id, quarter.id, l.id)}>
          <div className="lesson-num" style={{background:quarter.color}}>{counter}</div>
          <div className="lesson-body">
            <h3>{l.title}</h3>
            {l.sub && <div className="sub">{l.sub}</div>}
            <div className="lesson-status">
              {moved && <span className="pill todo">📦 Moved here</span>}
              {l.youtubeUrl && youtubeEmbedId(l.youtubeUrl) && <span className="pill done">🎬 Video</span>}
              <span className={"pill " + (learned ? "done":"todo")}>{learned ? "📖 Learned" : "📖 Not started"}</span>
              {best ? (
                <span className={"pill " + (best.correct/best.total>=0.7 ? "score-good":"score-bad")}>

                </span>
              ) : (
                <span className="pill todo">📝 {qCount ? qCount + " Qs in bank" : "No questions yet"}</span>
              )}
            </div>
          </div>
          <div className="chev">›</div>
        </button>
      );
    }

    return (
      <React.Fragment>
        <div className="backbar">
          <button className="backbtn" onClick={()=>goSubjectHome(subject.id)}>←</button>
          <div>
            <div className="qnum" style={{color:quarter.color}}>{subject.shortName} · {quarter.num}</div>

          </div>
        </div>

        {quarter.chapters.map(ch=>{
          const chLessons = nativeLessons.filter(l=>l.chapterId===ch.id);
          if(!chLessons.length) return null;
          return (
            <div key={ch.id}>
              <h3 className="chapter-title">{ch.title}</h3>
              {chLessons.map(l0=>renderLessonCard(l0, false))}
            </div>
          );
        })}

        {movedInLessons.length > 0 && (
          <div>
            <h3 className="chapter-title">📦 Moved Topics</h3>
            {movedInLessons.map(l0=>renderLessonCard(l0, true))}
          </div>

        <div className="longquiz-card" style={{flexDirection:"column", alignItems:"stretch"}}>

            <div style={{flex:1}}>
              <h3>{quarter.title} — Long Quiz</h3>
              <p>All topics in this quarter, combined into one test. {totalBankQ} question{totalBankQ===1?"":"s"} available.{progress.longQuiz[quarter.id] ? " Best: " + progress.longQuiz[quarter.id].best.correct + "/" + progress.longQuiz[quarter.id].best.total : ""}</p>
            </div>
            {!showSetup && (
              totalBankQ > 0 ? (
                <button className="btn" style={{background:quarter.color, color:"#fff"}} onClick={()=>setShowSetup(true)}>Start</button>

                <span className="pill todo">No questions yet</span>
              )

          </div>

            <div style={{marginTop:14}}>
              {longAvailTopics.length > 0 && (
                <React.Fragment>

                      selected={longTopics}
                      onToggle={(t)=>toggleTopicSelection(longTopics, t, setLongTopics)}
                    />
                  </div>
                </React.Fragment>
              )}
              <label className="field-label">Question type?</label>
              <div style={{marginBottom:14}}>
                <QuizTypePicker pool={longTopicPool} selected={longType} onSelect={setLongType} />
              </div>
              {longFilteredCount === 0 ? (
                <p className="sub">No questions of this type for this topic yet.</p>
              ) : (
                <React.Fragment>
                  <label className="field-label">How many questions would you like to take? (1–{longFilteredCount})</label>
                  <input type="number" className="text-input" min={1} max={longFilteredCount} value={longCount}
                    onChange={e=>{
                      const raw = e.target.value;
                      if(raw === ""){ setLongCount(""); return; }
                      const v = parseInt(raw,10);
                      if(Number.isNaN(v)) return;
                      setLongCount(Math.max(1, Math.min(v, longFilteredCount)));
                    }}
                    onBlur={()=>{
                      if(longCount === "" || Number.isNaN(longCount)) setLongCount(1);
                    }} />
                </React.Fragment>
              )}
              <div className="learn-footer" style={{gap:10}}>
                <button className="btn btn-ghost" onClick={()=>setShowSetup(false)}>Cancel</button>
                {longFilteredCount > 0 && (
                  <button className="btn btn-primary" style={{background:quarter.color}} onClick={()=>startLongQuiz(quarter, longCount, longTopics, longType)}>Start Long Quiz →</button>
                )}
              </div>
            </div>
          )}
        </div>
      </React.Fragment>
    );
  }

  /* ---------------- LESSON SCREEN ---------------- */
  function LessonScreen(){
    const subject = currentSubject();
    const quarter = subject.quarters.find(q=>q.id===nav.quarterId);
    const rawLesson = allSubjectLessons(subject).find(l=>l.id===nav.lessonId);
    const lesson = mergeLesson(rawLesson, edits);
    const tab = nav.tab || "learn";
    function setTab(t){ setNav(prev => ({...prev, tab:t})); }
    const [editingLesson, setEditingLesson] = useState(false);
    const [movingLesson, setMovingLesson] = useState(false);
    const [moveTarget, setMoveTarget] = useState("");
    const [quizCount, setQuizCount] = useState(1);
    const [quizTopics, setQuizTopics] = useState([TOPIC_ALL]);
    const [quizType, setQuizType] = useState(TYPE_ALL);
    const rec = progress.lessons[lesson.id];
    const qBank = getQuestions(lesson.id);
    const otherQuarters = subject.quarters.filter(q=>q.id !== quarter.id);
    const availTopics = bankTopics(qBank);
    const availTopicsWithCounts = availTopics.map(t=>({name:t, count: qBank.filter(q=>normTopic(q.topic)===t).length}));
    const topicFilteredBank = filterByTopics(qBank, quizTopics);
    const filteredBank = filterByType(topicFilteredBank, quizType);

    useEffect(()=>{ setQuizCount(Math.min(10, filteredBank.length) || 1); }, [lesson.id, filteredBank.length]);
    useEffect(()=>{ setQuizType(TYPE_ALL); }, [quizTopics, lesson.id]);

    const activeLessonQuiz = tab==="quiz" && quizSession && quizSession.kind==="lesson" && quizSession.key===lesson.id && !quizSession.finalAnswers;

    return (
      <React.Fragment>
        <div className="backbar">
          <button className="backbtn" onClick={()=>goQuarter(subject.id, quarter.id)}>←</button>
          <div>
            <div className="qnum" style={{color:quarter.color, fontSize:"8px"}}>{rawLesson.chapterTitle}</div>
            <h1 style={{margin:0, fontSize:"10px"}}>{lesson.title}</h1>
          </div>
        </div>

        <div className="tabbar">
          <button className={"tab" + (tab==="learn" ? " active":"")} onClick={()=>{setTab("learn"); setEditingLesson(false);}}>📖 Learn</button>
          <button className={"tab" + (tab==="quiz" ? " active":"")} onClick={()=>setTab("quiz")}>📝 Quiz{rec && rec.best ? " (" + rec.best.correct + "/" + rec.best.total + ")" : ""}</button>
          {activeLessonQuiz && (
            <button
              className="btn btn-ghost btn-sm"
              title="Stop this quiz"
              onClick={()=>{
                if(window.confirm("Stop this quiz? Your progress on this attempt won't be saved.")){
                  Sound.back();
                  setQuizSession(null);
                }
              }}
            >✕ Stop Quiz</button>
          )}
          <button className={"tab" + (tab==="manage" ? " active":"")} onClick={()=>setTab("manage")}>🗂️ Questions{qBank.length ? " (" + qBank.length + ")" : ""}</button>
        </div>

        <div key={tab} className="tab-fade">
        {tab === "learn" && (
          editingLesson ? (
            <LessonEditForm
              lesson={lesson}
              accent={quarter.color}
              onSave={(data)=>{ saveLessonEdit(lesson.id, data); setEditingLesson(false); }}
              onCancel={()=>setEditingLesson(false)}
            />
          ) : movingLesson ? (
            <div className="journal-page">
              <h3 style={{marginTop:0}}>Move "{lesson.title}" to another quarter</h3>
              <p className="sub">Currently in: {quarter.num} — {quarter.title}</p>
              <label className="field-label">Move to</label>
              <select className="text-input" value={moveTarget} onChange={e=>setMoveTarget(e.target.value)}>
                <option value="">Choose a quarter…</option>
                {otherQuarters.map(q=>(<option key={q.id} value={q.id}>{q.num} — {q.title}</option>))}
              </select>
              <div className="learn-footer" style={{gap:10}}>
                <button className="btn btn-ghost" onClick={()=>{setMovingLesson(false); setMoveTarget("");}}>Cancel</button>
                <button className="btn btn-primary" style={{background:quarter.color}} disabled={!moveTarget}
                  onClick={()=>{
                    moveLesson(lesson.id, moveTarget);
                    setMovingLesson(false);
                    goQuarter(subject.id, moveTarget);
                  }}>↔ Move Topic</button>
              </div>
            </div>
          ) : (
            <div className="journal-page">
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:10, flexWrap:"wrap"}}>
                <h3 style={{marginTop:0}}>{lesson.title}{lesson.sub ? " — " + lesson.sub : ""}</h3>
                <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setEditingLesson(true)}>✏️ Edit Topic</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setMovingLesson(true)}>↔ Move Quarter</button>
                </div>
              </div>
              {rawLesson.homeQuarterId !== quarter.id && (
                <p className="sub">📦 Originally in {subject.quarters.find(q=>q.id===rawLesson.homeQuarterId).num}, moved to {quarter.num}.</p>
              )}
              {(()=>{
                const vid = youtubeEmbedId(lesson.youtubeUrl);
                return vid ? (
                  <div className="video-embed">
                    <iframe
                      src={"https://www.youtube.com/embed/" + vid}
                      title={lesson.title + " video"}
                      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                      allowFullScreen
                    ></iframe>
                  </div>
                ) : null;
              })()}
              <ul>
                {(lesson.learn || []).map((line,i)=>(<li key={i}>{line}</li>))}
              </ul>
              <div className="learn-footer">
                <button className="btn btn-primary" style={{background:quarter.color}} onClick={()=>{markLearned(lesson.id); setTab("quiz");}}>
                  {rec && rec.learned ? "Reviewed — Take Quiz →" : "Mark as Learned & Take Quiz →"}
                </button>
              </div>
            </div>
          )
        )}

        {tab === "quiz" && (
          quizSession && quizSession.kind==="lesson" && quizSession.key===lesson.id ? (
            quizSession.finalAnswers ? (
              <ResultsView
                answers={quizSession.finalAnswers}
                accent={quarter.color}
                title={lesson.title}
                onRetry={()=>startLessonQuiz(quarter, lesson, quizCount, quizTopics, quizType)}
                onDone={()=>{setQuizSession(null);}}
              />
            ) : (
              <QuizRunner
                questions={quizSession.questions}
                accent={quarter.color}
                onFinish={handleQuizFinish}
                onStop={()=>{setQuizSession(null);}}
                showStopInline={false}
              />
            )
          ) : (
            <div className="quiz-card" style={{textAlign:"center"}}>
              {qBank.length === 0 ? (
                <React.Fragment>
                  <p style={{marginTop:0}}>No questions yet for <strong>{lesson.title}</strong>.</p>
                  <button className="btn btn-primary" style={{background:quarter.color}} onClick={()=>setTab("manage")}>➕ Add Questions</button>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <p style={{marginTop:0}}>Ready to test what you learned about <strong>{lesson.title}</strong>?</p>
                  {availTopics.length > 0 && (
                    <React.Fragment>
                      <label className="field-label">Which topic(s)?</label>
                      <div style={{maxWidth:320, margin:"0 auto 14px"}}>
                        <TopicPicker
                          topics={availTopicsWithCounts}
                          totalCount={qBank.length}
                          selected={quizTopics}
                          onToggle={(t)=>toggleTopicSelection(quizTopics, t, setQuizTopics)}
                        />
                      </div>
                    </React.Fragment>
                  )}
                  <label className="field-label">Question type?</label>
                  <div style={{maxWidth:320, margin:"0 auto 14px"}}>
                    <QuizTypePicker pool={topicFilteredBank} selected={quizType} onSelect={setQuizType} />
                  </div>
                  {filteredBank.length === 0 ? (
                    <p className="sub">No questions of this type for this topic yet.</p>
                  ) : (
                    <React.Fragment>
                      <label className="field-label">How many questions would you like to take? (1–{filteredBank.length})</label>
                      <input type="number" className="text-input" style={{maxWidth:120, margin:"0 auto 14px"}} min={1} max={filteredBank.length} value={quizCount}
                        onChange={e=>{
                          const raw = e.target.value;
                          if(raw === ""){ setQuizCount(""); return; }
                          const v = parseInt(raw,10);
                          if(Number.isNaN(v)) return;
                          setQuizCount(Math.max(1, Math.min(v, filteredBank.length)));
                        }}
                        onBlur={()=>{
                          if(quizCount === "" || Number.isNaN(quizCount)) setQuizCount(1);
                        }} />
                      <div>
                        <button className="btn btn-primary" style={{background:quarter.color}} onClick={()=>startLessonQuiz(quarter, lesson, quizCount, quizTopics, quizType)}>
                          {rec && rec.best ? "Retake Quiz" : "Start Quiz"}
                        </button>
                      </div>
                    </React.Fragment>
                  )}
                </React.Fragment>
              )}
            </div>
          )
        )}

        {tab === "manage" && (
          <QuestionBankManager
            lessonId={lesson.id}
            questions={qBank}
            accent={quarter.color}
            onChange={(next)=>setLessonQuestions(lesson.id, next)}
          />
        )}
        </div>
      </React.Fragment>
    );
  }

  /* ---------------- LONG QUIZ SCREEN (uses quizSession set at quarter level) ---------------- */
  function LongQuizScreen(){
    const subject = currentSubject();
    const quarter = subject.quarters.find(q=>q.id===nav.quarterId);
    return (
      <React.Fragment>
        <div className="backbar">
          <button className="backbtn" onClick={()=>goQuarter(subject.id, quarter.id)}>←</button>
          <div>
            <div className="qnum" style={{color:quarter.color}}>{subject.shortName} · {quarter.num} · Long Quiz</div>
            <h1 style={{margin:0, fontSize:"20px"}}>🏆 {quarter.title}</h1>
          </div>
        </div>
        {quizSession.finalAnswers ? (
          <ResultsView
            answers={quizSession.finalAnswers}
            accent={quarter.color}
            title={quarter.title + " Long Quiz"}
            onRetry={()=>startLongQuiz(quarter)}
            onDone={()=>{setQuizSession(null); goQuarter(subject.id, quarter.id);}}
          />
        ) : (
          <QuizRunner
            questions={quizSession.questions}
            accent={quarter.color}
            onFinish={handleQuizFinish}
            onStop={()=>{setQuizSession(null); goQuarter(subject.id, quarter.id);}}
          />
        )}
      </React.Fragment>
    );
  }

  let content;
  if(quizSession && quizSession.kind==="long"){
    content = <LongQuizScreen/>;
  } else if(nav.screen==="quarter"){
    content = <QuarterScreen/>;
  } else if(nav.screen==="lesson"){
    content = <LessonScreen/>;
  } else if(nav.screen==="home"){
    content = <SubjectHomeScreen/>;
  } else if(nav.screen==="notes"){
    content = <NotesScreen/>;
  } else if(nav.screen==="subjects"){
    content = <SubjectsScreen/>;
  } else {
    content = <DashboardScreen/>;
  }

  const headerIcon = nav.subjectId ? (currentSubject() ? currentSubject().icon : "🎓") : "🎓";
  const headerLabel = nav.subjectId && currentSubject() ? currentSubject().name : "Grade 2";
  const headerBg = nav.subjectId && currentSubject() ? currentSubject().color : "linear-gradient(150deg, var(--night), var(--night-deep))";
  const screenKey = (quizSession && quizSession.kind==="long" ? "longquiz-"+quizSession.key : nav.screen) + "-" + (nav.subjectId||"") + "-" + (nav.quarterId||"") + "-" + (nav.lessonId||"");

  const headerBar = (
    <div className={"app-header" + (nav.subjectId ? " app-header-footer" : "")}>
      <div className="brand" onClick={goDashboard} style={{cursor:"pointer"}}>
        <div className="brand-badge" style={{background:headerBg}}>{headerIcon}</div>
        <div className="brand-text">
          <div className="eyebrow">Sacred Heart Academy of Pasig</div>
          <h1>{headerLabel}</h1>
        </div>
      </div>
      <div className="header-actions">
        <button
          className="settings-btn"
          title={settings.soundEnabled !== false ? "Mute sound" : "Unmute sound"}
          onClick={()=>{
            const next = settings.soundEnabled === false;
            updateSettings({soundEnabled: next});
            if(next) setTimeout(()=>Sound.tap(), 30);
          }}
        >{settings.soundEnabled !== false ? "🔊" : "🔇"}</button>
        <button className="settings-btn" title="Save everything now" onClick={saveEverythingNow}>💾</button>
      </div>
    </div>
  );

  return (
    <React.Fragment>
      {!nav.subjectId && headerBar}
      {saveFlash && <div className="save-toast">{saveFlash}</div>}
      <div key={screenKey} className="screen-enter">{content}</div>
      {nav.subjectId && headerBar}
    </React.Fragment>
  );
}

/* =========================================================
   STARTUP — hydrate from Firebase first so this device sees
   the latest saved progress, then mount the app. No login.
   ========================================================= */
(async function start(){
  await loadFromCloud();
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
})();
</script>
</body>
</html>
